<!doctype html><html lang='ru'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Голосование</title><link rel='stylesheet' href='styles.css'></head><body><div class='card'><div class='row' style='justify-content:space-between'><strong id='welcome'></strong><a id='main-link'><button class='ghost'>Main</button></a></div><div id='vote-lock'></div><h3 id='param-title'></h3><h4 id='stage-title'></h4><div id='candidate-list' class='scroll'></div><div class='row'><button id='confirm-btn'>Подтвердить место</button></div><div id='preview' class='hidden scroll'></div><button id='finish-btn' class='hidden'>Отправить модератору</button></div>
<script type='module'>import { getEmailFromUrl, getUser, getVerifiedPlayers, POINTS, PARAMS, upsertSubmission, withEmail } from './app.js';const email=getEmailFromUrl();if(!email) location.href='index.html';document.getElementById("main-link").href=withEmail('main.html',email);let players=[],state={votes:{}},draft={param:0,place:1,remaining:[],selected:new Set(),groups:{}};function ensureVote(p){if(!state.votes[p])state.votes[p]={};if(!state.votes[p][email])state.votes[p][email]={};}function reset(){draft={param:0,place:1,remaining:[...players],selected:new Set(),groups:{}};}function render(){document.getElementById("welcome").textContent=email;if(players.length<10){document.getElementById("vote-lock").textContent='Нужно 10 игроков';return;}document.getElementById("param-title").textContent=PARAMS[draft.param];if(draft.place<=10){document.getElementById("candidate-list").innerHTML='';draft.remaining.forEach(p=>{const d=document.createElement('div');d.className='line';d.textContent=p;d.onclick=()=>{draft.selected.has(p)?draft.selected.delete(p):draft.selected.add(p);};document.getElementById("candidate-list").appendChild(d);});}else{document.getElementById("finish-btn").classList.remove('hidden');document.getElementById("preview").classList.remove('hidden');}}document.getElementById("confirm-btn").onclick=()=>{const pick=[...draft.selected];draft.groups[draft.place]=pick;draft.remaining=draft.remaining.filter(p=>!draft.selected.has(p));draft.selected=new Set();draft.place++;render();};document.getElementById("finish-btn").onclick=async()=>{for(let i=1;i<=10;i++)for(const p of (draft.groups[i]||[])){ensureVote(p);state.votes[p][email][PARAMS[draft.param]]=POINTS[i-1];}if(draft.param<3){draft.param++;draft.place=1;draft.remaining=[...players];draft.selected=new Set();draft.groups={};render();}else{await upsertSubmission(email,state.votes);alert('Отправлено');state.votes={};reset();render();}};async function tick(){const u=await getUser(email);if(!u) return location.href='index.html';if(!u.verified) return location.href=withEmail('verify.html',email);players=await getVerifiedPlayers(email);if(!draft.remaining.length) reset();render();}tick();setInterval(tick,5000);</script></body></html>
