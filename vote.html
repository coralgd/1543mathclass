<!doctype html><html lang='ru'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Голосование</title><link rel='stylesheet' href='styles.css'></head><body>
<div class='card'>
<div class='row' style='justify-content:space-between'><strong id='welcome'></strong><div><a href='main.html'><button class='ghost'>Main</button></a> <a href='leaderboard.html'><button class='ghost'>Лидерборд</button></a></div></div>
<div id='vote-lock'></div><h3 id='param-title'></h3><h4 id='stage-title'></h4><div id='stage-stats'></div>
<div id='candidate-list' class='scroll'></div><div class='row'><button id='back-btn' class='ghost'>Назад</button><button id='confirm-btn'>Подтвердить место</button></div>
<div id='preview' class='hidden scroll'></div><button id='finish-btn' class='hidden'>Отправить модератору</button>
</div>
<script type='module'>
import { getSessionEmail, watchCurrentUser, POINTS, PARAMS, getVerifiedPlayers, upsertSubmission } from './app.js';
if(!getSessionEmail()) location.href='index.html';
let user=null,state={votes:{}},players=[];
let draft={param:0,place:1,remaining:[],selected:new Set(),groups:{}}; const $=id=>document.getElementById(id);
function ensureVote(p,uid){if(!state.votes[p]) state.votes[p]={}; if(!state.votes[p][uid]) state.votes[p][uid]={};}
function resetParam(){draft.place=1;draft.remaining=[...players];draft.selected=new Set();draft.groups={};}
function render(){const locked=players.length<10;$('vote-lock').textContent=locked?`Нужно минимум 10 других верифицированных игроков, сейчас ${players.length}`:'';$('vote-lock').className=locked?'danger':'ok'; if(locked){$('candidate-list').innerHTML='';return;}$('param-title').textContent=`${PARAMS[draft.param]} (${draft.param+1}/4)`;if(draft.place<=10){const rem=draft.remaining.length,placesLeft=11-draft.place,max=rem-(placesLeft-1);$('stage-title').textContent=`Место ${draft.place} (${POINTS[draft.place-1]} баллов)`;$('stage-stats').textContent=`Выберите 1..${max}`;$('candidate-list').innerHTML='';draft.remaining.forEach(p=>{const d=document.createElement('div');d.className='line'+(draft.selected.has(p)?' sel':'');d.textContent=p;d.onclick=()=>{if(draft.selected.has(p))draft.selected.delete(p);else if(draft.selected.size<max)draft.selected.add(p);render();};$('candidate-list').appendChild(d);});$('preview').classList.add('hidden');$('finish-btn').classList.add('hidden');}else{let html=`<h3>Итог ${PARAMS[draft.param]}</h3>`;for(let i=1;i<=10;i++) html+=`<div>${i} место: ${(draft.groups[i]||[]).join(', ')||'—'}</div>`;$('preview').innerHTML=html;$('preview').classList.remove('hidden');$('finish-btn').classList.remove('hidden');$('candidate-list').innerHTML='';$('stage-title').textContent='Проверка';$('stage-stats').textContent='';}}
$('confirm-btn').onclick=()=>{const rem=draft.remaining.length,placesLeft=11-draft.place,max=rem-(placesLeft-1),pick=[...draft.selected];if(pick.length<1||pick.length>max){alert(`Выберите 1..${max}`);return;}draft.groups[draft.place]=pick;draft.remaining=draft.remaining.filter(p=>!draft.selected.has(p));draft.selected=new Set();draft.place++;render();};
$('back-btn').onclick=()=>{if(draft.place<=1)return;const prev=draft.place-1;if(draft.groups[prev]){draft.remaining=[...draft.groups[prev],...draft.remaining];delete draft.groups[prev];}draft.place=prev;draft.selected=new Set();render();};
$('finish-btn').onclick=async()=>{for(let i=1;i<=10;i++) for(const p of (draft.groups[i]||[])){ensureVote(p,user.email);state.votes[p][user.email][PARAMS[draft.param]]=POINTS[i-1];}if(draft.param<3){draft.param++;resetParam();}else{await upsertSubmission(user.email,structuredClone(state.votes));alert('Полная отправка из 4 критериев ушла модератору');draft={param:0,place:1,remaining:[...players],selected:new Set(),groups:{}};state.votes={};}render();};
watchCurrentUser(async(u)=>{if(!u){location.href='index.html';return;}if(u.verified!==true){location.href='verify.html';return;}user=u;state=u.state||{votes:{}};document.getElementById('welcome').textContent=u.email;players=await getVerifiedPlayers(u.email);if(!draft.remaining.length) resetParam();render();});
</script></body></html>
