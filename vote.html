<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='styles.css'></head><body><div class='card'><div class='row'><strong id='w'></strong><a id='back'><button class='ghost'>Main</button></a></div><div id='status'></div><div id='list' class='scroll'></div><button id='next'>Подтвердить место</button><button id='send' class='hidden'>Отправить модератору</button></div><script type='module'>import {getEmailFromUrl,watchUser,withEmail,getVerifiedPlayers,POINTS,PARAMS,submitVotes} from './app.js';const e=getEmailFromUrl();if(!e)location.href='index.html';back.href=withEmail('main.html',e);let players=[],votes={},param=0,place=1,selected=[];function render(){w.textContent=e;if(players.length<10){status.textContent='Нужно минимум 10 игроков';return;}status.textContent=`${PARAMS[param]} | место ${place}`;list.innerHTML='';if(place<=10){players.forEach(p=>{const d=document.createElement('div');d.className='line';d.textContent=p;d.onclick=()=>{if(selected.includes(p))selected=selected.filter(x=>x!==p);else selected.push(p);d.classList.toggle('sel');};list.appendChild(d);});send.classList.add('hidden');}else send.classList.remove('hidden');}
next.onclick=()=>{selected.forEach(p=>{votes[p]=votes[p]||{};votes[p][e]=votes[p][e]||{};votes[p][e][PARAMS[param]]=POINTS[place-1];players=players.filter(x=>x!==p);});selected=[];place++;if(place>10){if(param<3){param++;place=1;getVerifiedPlayers(e).then(p=>{players=p;render();});} }render();};
send.onclick=async()=>{await submitVotes(e,votes);alert('Отправлено модератору');votes={};param=0;place=1;players=await getVerifiedPlayers(e);render();};
watchUser(e,async u=>{if(!u)return location.href='index.html';if(!u.verified)return location.href=withEmail('verify.html',e);players=await getVerifiedPlayers(e);render();});</script></body></html>
