<!doctype html><html lang='ru'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Голосование</title><link rel='stylesheet' href='styles.css'></head><body>
<div class='card'>
<div class='row' style='justify-content:space-between'><strong id='welcome'></strong><div><a href='main.html'><button class='ghost'>Main</button></a> <a href='leaderboard.html'><button class='ghost'>Лидерборд</button></a></div></div>
<h3>Кого оцениваем</h3><select id='target'></select><div id='status' class='muted'></div>
<h3 id='param-title'></h3><div id='candidate-list' class='scroll'></div>
<div class='row'><button id='save-btn'>Сохранить/изменить</button><button id='confirm-btn' class='ghost'>Подтвердить отправку</button><button id='revoke-btn' class='ghost'>Отозвать</button></div>
</div>
<script type='module'>
import { requireVerified, saveState, PARAMS } from './app.js';
const user=await requireVerified(); if(!user) location.href='index.html';
const state=user.state||{players:[],ballots:{}};
state.players=Array.from(new Set([...(state.players||[]), user.email]));
state.ballots=state.ballots||{};
const $=id=>document.getElementById(id);
$('welcome').textContent=user.email;
const targets=state.players.filter(p=>p!==user.email);
$('target').innerHTML=targets.map(t=>`<option>${t}</option>`).join('');
function getBallot(target){state.ballots[target]=state.ballots[target]||{};state.ballots[target][user.email]=state.ballots[target][user.email]||{scores:{},status:'draft'};return state.ballots[target][user.email];}
function render(){const t=$('target').value;const b=getBallot(t);$('candidate-list').innerHTML=PARAMS.map((pm,i)=>`<div class='line'><label>${pm}</label><input type='number' min='0' max='9' id='i_${i}' value='${Number.isInteger(b.scores[pm])?b.scores[pm]:''}'></div>`).join('');$('status').textContent=`Статус: ${b.status==='confirmed'?'подтверждено':(b.status==='pending'?'на подтверждении':'черновик')}`;}
$('target').onchange=render;
$('save-btn').onclick=async()=>{const t=$('target').value;const b=getBallot(t);for(const pm of PARAMS){const v=Number(document.getElementById(`i_${PARAMS.indexOf(pm)}`).value);if(!Number.isInteger(v)||v<0||v>9){alert('Заполните все критерии 0..9');return;}b.scores[pm]=v;}b.status='pending';await saveState(user.email,user.password,user.verified,state);alert('Оценка сохранена, перенаправление на Main');location.href='main.html';};
$('confirm-btn').onclick=async()=>{const b=getBallot($('target').value);if(PARAMS.some(pm=>!Number.isInteger(b.scores[pm]))){alert('Сначала заполните все критерии');return;}b.status='confirmed';await saveState(user.email,user.password,user.verified,state);render();};
$('revoke-btn').onclick=async()=>{const t=$('target').value;delete state.ballots[t][user.email];await saveState(user.email,user.password,user.verified,state);render();};
render();
</script></body></html>
