<!doctype html><html lang='ru'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Лидерборд</title><link rel='stylesheet' href='styles.css'></head><body><div class='card'><div class='row' style='justify-content:space-between'><strong id='welcome'></strong><a id='main-link'><button class='ghost'>Main</button></a></div><table><thead><tr><th>Игрок</th><th>I</th><th>II</th><th>III</th><th>IV</th><th>Общий</th></tr></thead><tbody id='tbody'></tbody></table></div>
<script type='module'>import { getEmailFromUrl, getUser, getVerifiedPlayers, PARAMS, getParamStats, withEmail } from './app.js';const email=getEmailFromUrl();if(!email) location.href='index.html';document.getElementById("main-link").href=withEmail('main.html',email);async function tick(){const u=await getUser(email);if(!u) return location.href='index.html';if(!u.verified) return location.href=withEmail('verify.html',email);document.getElementById("welcome").textContent=email;const vt=u.state?.approvedVotes||{};const players=await getVerifiedPlayers();document.getElementById("tbody").innerHTML='';players.forEach(p=>{const s=PARAMS.map(pm=>getParamStats(vt,p,pm));const vals=s.flatMap((_,i)=>Object.values(vt[p]||{}).map(v=>v[PARAMS[i]]).filter(Number.isInteger));const c=vals.length,a=c?vals.reduce((x,y)=>x+y,0)/c:0;const tr=document.createElement('tr');tr.innerHTML=`<td>${p}</td><td>${s[0].avg.toFixed(2)}</td><td>${s[1].avg.toFixed(2)}</td><td>${s[2].avg.toFixed(2)}</td><td>${s[3].avg.toFixed(2)}</td><td>${a.toFixed(2)}</td>`;document.getElementById("tbody").appendChild(tr);});}tick();setInterval(tick,5000);</script></body></html>
