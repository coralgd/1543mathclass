<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='styles.css'></head><body><div class='card'><div class='row'><strong id='w'></strong><a id='back'><button class='ghost'>Main</button></a></div><table><thead><tr><th>Игрок</th><th>I</th><th>II</th><th>III</th><th>IV</th><th>Общий</th></tr></thead><tbody id='tb'></tbody></table></div><script type='module'>import {getEmailFromUrl,watchUser,withEmail,getVerifiedPlayers,PARAMS,getParamStats} from './app.js';const e=getEmailFromUrl();if(!e)location.href='index.html';back.href=withEmail('main.html',e);watchUser(e,async u=>{if(!u)return location.href='index.html';if(!u.verified)return location.href=withEmail('verify.html',e);w.textContent=e;const vt=u.state?.approvedVotes||{};const pl=await getVerifiedPlayers();tb.innerHTML='';pl.forEach(p=>{const s=PARAMS.map(pm=>getParamStats(vt,p,pm));const vals=s.flatMap((_,i)=>Object.values(vt[p]||{}).map(v=>v[PARAMS[i]]).filter(Number.isInteger));const a=vals.length?vals.reduce((x,y)=>x+y,0)/vals.length:0;const tr=document.createElement('tr');tr.innerHTML=`<td>${p}</td><td>${s[0].avg.toFixed(2)}</td><td>${s[1].avg.toFixed(2)}</td><td>${s[2].avg.toFixed(2)}</td><td>${s[3].avg.toFixed(2)}</td><td>${a.toFixed(2)}</td>`;tb.appendChild(tr);});});</script></body></html>
