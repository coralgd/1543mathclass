<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='styles.css'></head><body><div class='card'><h2>Ожидайте верификацию</h2><div id='msg'></div></div><script type='module'>import {getEmailFromUrl,watchUser,withEmail} from './app.js';const e=getEmailFromUrl();if(!e)location.href='index.html';watchUser(e,u=>{if(!u)return location.href='index.html';msg.textContent=u.verified?'Переходим...':'Аккаунт еще не верифицирован';if(u.verified)location.href=withEmail('main.html',e);});</script></body></html>
