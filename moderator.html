<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='styles.css'></head><body><div class='card'><div class='row'><strong id='w'></strong><a id='back'><button class='ghost'>Main</button></a></div><div class='tabs'><button id='t1'>pending</button><button id='t2' class='ghost'>send</button></div><div id='users' class='scroll'></div><div id='subs' class='scroll hidden'></div><div id='detail'></div></div><script type='module'>import {getEmailFromUrl,watchUser,watchUsers,withEmail,toggleVerify,approveSubmission,PARAMS} from './app.js';const e=getEmailFromUrl();if(!e)location.href='index.html';back.href=withEmail('main.html',e);let all=[];const full=v=>{const arr=Object.values(v||{});return arr.length&&arr.every(o=>PARAMS.every(pm=>Number.isInteger(o?.[pm])))};t1.onclick=()=>{users.classList.remove('hidden');subs.classList.add('hidden');};t2.onclick=()=>{users.classList.add('hidden');subs.classList.remove('hidden');};function rUsers(){users.innerHTML='';all.forEach(u=>{const d=document.createElement('div');d.className='line';d.innerHTML=`${u.email} <button class='${u.verified?'btn-unverify':'btn-verify'}'>${u.verified?'Снять вериф':'Верифнуть'}</button>`;d.querySelector('button').onclick=()=>toggleVerify(u.email);users.appendChild(d);});}
function rSubs(){subs.innerHTML='';all.filter(u=>u.state?.pendingSubmission?.status==='pending'&&full(u.state?.pendingSubmission?.votes)).forEach((u,i)=>{const d=document.createElement('div');d.className='line';d.textContent=`${i+1}. ${u.email}`;d.onclick=()=>{detail.innerHTML=`<button id='ok'>Подтвердить</button>`;ok.onclick=()=>approveSubmission(u.email,e);};subs.appendChild(d);});}
watchUser(e,u=>{if(!u)return location.href='index.html';if(!u.verified)return location.href=withEmail('verify.html',e);if(u.role!=='moder')return location.href=withEmail('main.html',e);w.textContent='Модератор: '+e;});watchUsers(arr=>{all=arr;rUsers();rSubs();});</script></body></html>
