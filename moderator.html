<!doctype html><html lang='ru'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Модератор</title><link rel='stylesheet' href='styles.css'></head><body><div class='card'><div class='row' style='justify-content:space-between'><strong id='welcome'></strong><a id='main-link'><button class='ghost'>Main</button></a></div><div class='tabs'><button id='tab-pending'>pending</button><button id='tab-send' class='ghost'>send</button></div><div id='users_list' class='scroll'></div><div id='sub_list' class='scroll hidden'></div><div id='sub_detail'></div></div>
<script type='module'>import { getEmailFromUrl, getUser, getAllUsers, toggleUserVerification, applySubmissionToLeaderboard, PARAMS, withEmail } from './app.js';const email=getEmailFromUrl();if(!email) location.href='index.html';document.getElementById("main-link").href=withEmail('main.html',email);let users=[];document.getElementById("tab-pending").onclick=()=>{users_list.classList.remove('hidden');sub_list.classList.add('hidden');};document.getElementById("tab-send").onclick=()=>{users_list.classList.add('hidden');sub_list.classList.remove('hidden');};function full(v){const ps=Object.values(v||{});return ps.length&&ps.every(x=>PARAMS.every(pm=>Number.isInteger(x?.[pm])));}function rUsers(){users_list.innerHTML='';users.forEach(u=>{const d=document.createElement('div');d.className='line';d.innerHTML=`${u.email} <button class='${u.verified?'btn-unverify':'btn-verify'}'>${u.verified?'Снять':'Верифнуть'}</button>`;d.querySelector('button').onclick=()=>toggleUserVerification(u.email,u.verified,email);users_list.appendChild(d);});}function rSubs(){sub_list.innerHTML='';users.filter(u=>u.state?.pendingSubmission?.status==='pending'&&full(u.state?.pendingSubmission?.votes)).forEach((u,i)=>{const d=document.createElement('div');d.className='line';d.textContent=`${i+1}. ${u.email}`;d.onclick=()=>{sub_detail.innerHTML=`<button id='ap'>Применить</button>`;document.getElementById('ap').onclick=()=>applySubmissionToLeaderboard(u.email,email);};sub_list.appendChild(d);});}async function tick(){const me=await getUser(email);if(!me) return location.href='index.html';if(!me.verified) return location.href=withEmail('verify.html',email);if(me.role!=='moder') return location.href=withEmail('main.html',email);document.getElementById("welcome").textContent=`Модератор: ${email}`;users=await getAllUsers();rUsers();rSubs();}tick();setInterval(tick,5000);</script></body></html>
