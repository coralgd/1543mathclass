<!doctype html><html lang='ru'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Модератор</title><link rel='stylesheet' href='styles.css'></head><body>
<div class='card'>
<div class='row' style='justify-content:space-between'><strong id='welcome'></strong><a href='main.html'><button class='ghost'>Main</button></a></div>
<div class='tabs'><button id='tab-pending'>pending</button><button id='tab-send' class='ghost'>send</button></div>
<div id='pending-box'>
<div class='row'><input id='search' placeholder='Поиск email'><select id='verified-filter'><option value='all'>Все</option><option value='yes'>Только verified</option><option value='no'>Только not verified</option></select></div>
<div id='users-list' class='scroll'></div>
</div>
<div id='send-box' class='hidden'>
<div id='sub-list' class='scroll'></div>
<div id='sub-detail'></div>
</div>
</div>
<script type='module'>
import { requireVerified, getAllUsers, toggleUserVerification, getAllSubmissions, applySubmissionToLeaderboard } from './app.js';
const me=await requireVerified(); if(!me || me.role!=='moder') location.href='main.html';
const $=id=>document.getElementById(id);
$('welcome').textContent=`Модератор: ${me.email}`;
let users=[],subs=[];
function tab(name){const p=name==='pending';$('pending-box').classList.toggle('hidden',!p);$('send-box').classList.toggle('hidden',p);$('tab-pending').className=p?'':'ghost';$('tab-send').className=!p?'':'ghost';}
$('tab-pending').onclick=()=>tab('pending');$('tab-send').onclick=()=>tab('send');
function renderUsers(){const q=$('search').value.toLowerCase(),vf=$('verified-filter').value;const list=users.filter(u=>(u.email||'').toLowerCase().includes(q)).filter(u=>vf==='all'||(vf==='yes'?u.verified===true:u.verified!==true));$('users-list').innerHTML='';list.forEach(u=>{const row=document.createElement('div');row.className='line';const btnText=u.verified?'Снять вериф':'Верифнуть';const btnClass=u.verified?'danger':'ok';row.innerHTML=`<div class='row' style='justify-content:space-between'><div>${u.email} <small>(${u.verified?'verified':'not verified'})</small></div><button class='${btnClass}'>${btnText}</button></div>`;row.querySelector('button').onclick=async()=>{await toggleUserVerification(u.email,!!u.verified,me.email);await load();};$('users-list').appendChild(row);});}
function renderSubDetail(s){if(!s){$('sub-detail').innerHTML='';return;}let html=`<h3>${s.voterEmail}</h3>`;Object.entries(s.votes||{}).forEach(([player,byParam])=>{html+=`<div class='line'><strong>${player}</strong><br>${Object.entries(byParam).map(([k,v])=>`${k}: ${v}`).join('<br>')}</div>`;});html+=`<button id='apply-btn'>Подтвердить и применить в лидерборд</button>`;$('sub-detail').innerHTML=html;$('apply-btn').onclick=async()=>{await applySubmissionToLeaderboard(s,me.email);await load();tab('send');};}
function renderSubs(){$('sub-list').innerHTML='';subs.forEach((s,idx)=>{const d=document.createElement('div');d.className='line';d.textContent=`${idx+1}. ${s.voterEmail} (${s.status||'pending'})`;d.onclick=()=>renderSubDetail(s);$('sub-list').appendChild(d);});}
async function load(){users=await getAllUsers();subs=(await getAllSubmissions()).sort((a,b)=>(a.voterEmail||'').localeCompare(b.voterEmail||''));renderUsers();renderSubs();renderSubDetail(null);}
$('search').oninput=renderUsers;$('verified-filter').onchange=renderUsers;
await load();
</script></body></html>
