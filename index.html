<!doctype html><html lang='ru'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Вход</title><link rel='stylesheet' href='styles.css'></head><body><div class='card'><h2>Вход / Регистрация</h2><input id='email' placeholder='Email'><br><br><input id='password' type='password' placeholder='Пароль'><br><br><button id='login'>Войти</button> <button id='reg' class='ghost'>Регистрация</button><div id='msg'></div></div><script type='module'>import {getUser,registerUser,withEmail} from './app.js';const $=id=>document.getElementById(id);login.onclick=async()=>{try{const e=$('email').value.trim(),p=$('password').value,u=await getUser(e);if(!u||u.password!==p)throw new Error('Неверный логин/пароль');location.href=withEmail(u.verified?'main.html':'verify.html',e);}catch(err){msg.textContent=err.message;}};reg.onclick=async()=>{try{const e=$('email').value.trim(),p=$('password').value;await registerUser(e,p);location.href=withEmail('verify.html',e);}catch(err){msg.textContent=err.message;}};</script></body></html>
