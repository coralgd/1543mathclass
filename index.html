<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Голосование игроков</title>
  <style>
    :root { font-family: Inter, Arial, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f5f7fb; color: #1f2937; }
    .card { width: min(94vw, 920px); background: #fff; border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.08); padding: 24px; }
    h1,h2,h3 { margin: 0 0 8px; }
    .row { display: flex; gap: 10px; align-items: center; }
    input[type="text"] { flex: 1; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; }
    button { padding: 10px 14px; border: 0; border-radius: 8px; cursor: pointer; background: #2563eb; color: #fff; font-size: .95rem; }
    button.secondary { background: #4b5563; }
    button.ghost { background: #e5e7eb; color: #111827; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .hidden { display: none; }
    .hint { color: #6b7280; font-size: .92rem; }
    .danger { color: #b91c1c; }
    .ok { color: #166534; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; }
    .tabs { display: flex; gap: 8px; margin: 14px 0; }
    .players { margin-top: 8px; display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:8px; }
    .player-pick { border:1px solid #e5e7eb; border-radius:8px; padding:8px; }
    .stage { border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; margin-top: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #f0f2f6; }
    th { font-size: .9rem; color: #6b7280; }
  </style>
</head>
<body>
  <div class="card" id="login-screen">
    <h1>Начальный экран</h1>
    <p class="hint">Введите ник и нажмите «Войти».</p>
    <div class="row">
      <input id="nickname" type="text" placeholder="Ваш ник" maxlength="24" />
      <button id="login-btn">Войти</button>
    </div>
  </div>

  <div class="card hidden" id="app-screen">
    <div class="topbar">
      <div>
        <strong id="welcome"></strong>
        <div class="hint">Голосование по местам 1..10 (1 место = 9 баллов, 10 место = 0 баллов).</div>
      </div>
      <button class="secondary" id="logout-btn">Выйти</button>
    </div>

    <div class="row" style="margin-bottom:12px;">
      <input id="new-player" type="text" placeholder="Ник нового игрока" maxlength="24" />
      <button id="add-player-btn">Добавить</button>
    </div>

    <div class="tabs">
      <button id="vote-tab-btn">Голосовать</button>
      <button id="leaderboard-tab-btn" class="ghost">Лидерборд</button>
    </div>

    <div id="vote-panel">
      <div id="vote-lock" class="hint danger"></div>
      <div id="vote-stage" class="stage hidden">
        <h3 id="stage-title"></h3>
        <p id="stage-hint" class="hint"></p>
        <div id="selected-info" class="hint"></div>
        <div id="pick-list" class="players"></div>
        <div class="row" style="margin-top:12px;">
          <button id="confirm-stage-btn">Подтвердить место</button>
          <button id="skip-stage-btn" class="ghost">Пропустить место</button>
        </div>
        <p class="hint" id="progress"></p>
      </div>
      <div id="finish-wrap" class="stage hidden">
        <h3>Завершение голосования</h3>
        <p id="finish-hint" class="hint"></p>
        <button id="finish-vote-btn">Завершить и сохранить голос</button>
      </div>
    </div>

    <div id="leaderboard-panel" class="hidden">
      <table>
        <thead><tr><th>Игрок</th><th>Среднее</th><th>Оценок</th></tr></thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </div>
  </div>

<script>
const STORAGE_KEY = 'local-vote-app-v5';
const defaultPlayers = ['Игрок_1','Игрок_2','Игрок_3'];
const POINTS = [9,8,7,6,5,4,3,2,1,0];
const WORST_STAGE_FROM = 8;
const state = loadState();
let draft = null;

const $ = (id)=>document.getElementById(id);
const loginScreen=$('login-screen'), appScreen=$('app-screen'), nicknameInput=$('nickname'), loginBtn=$('login-btn');
const welcome=$('welcome'), logoutBtn=$('logout-btn'), newPlayerInput=$('new-player'), addPlayerBtn=$('add-player-btn');
const voteTabBtn=$('vote-tab-btn'), leaderboardTabBtn=$('leaderboard-tab-btn');
const votePanel=$('vote-panel'), leaderboardPanel=$('leaderboard-panel'), leaderboardBody=$('leaderboard-body');
const voteLock=$('vote-lock'), voteStage=$('vote-stage'), stageTitle=$('stage-title'), stageHint=$('stage-hint'), selectedInfo=$('selected-info');
const pickList=$('pick-list'), confirmStageBtn=$('confirm-stage-btn'), skipStageBtn=$('skip-stage-btn'), progress=$('progress');
const finishWrap=$('finish-wrap'), finishHint=$('finish-hint'), finishVoteBtn=$('finish-vote-btn');

function loadState(){try{const p=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');return{currentUser:p.currentUser||'',players:Array.isArray(p.players)&&p.players.length?p.players:defaultPlayers,votes:p.votes&&typeof p.votes==='object'?p.votes:{},activeTab:p.activeTab==='leaderboard'?'leaderboard':'vote'};}catch{return{currentUser:'',players:defaultPlayers,votes:{},activeTab:'vote'};}}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function ensurePlayerVoteMap(player){ if(!state.votes[player]||typeof state.votes[player]!=='object') state.votes[player]={}; }

function initDraft(){ draft={ mode:'main', stage:1, picks:{}, moveStage:1, moveSelection:{} }; }
function playersAtPlace(place){ return Object.entries(draft.picks).filter(([,p])=>p===place).map(([n])=>n); }
function emptyPlaces(){ const res=[]; for(let i=1;i<=10;i++) if(playersAtPlace(i).length===0) res.push(i); return res; }

function render(){ const inUser=Boolean(state.currentUser); loginScreen.classList.toggle('hidden',inUser); appScreen.classList.toggle('hidden',!inUser); if(inUser) welcome.textContent=`Вы вошли как: ${state.currentUser}`; if(!draft) initDraft(); renderVoteFlow(); renderLeaderboard(); switchTab(state.activeTab,false); }

function renderVoteFlow(){
  const locked=state.players.length<10;
  voteLock.textContent=locked?`Голосование заблокировано: нужно минимум 10 игроков, сейчас ${state.players.length}.`:'Стадия 1: распределите места 1..10. Стадия 2: по каждому месту выберите худших и перенесите их на следующее место.';
  voteLock.className=`hint ${locked?'danger':'ok'}`;
  voteStage.classList.toggle('hidden',locked);
  finishWrap.classList.toggle('hidden',locked);
  if(locked) return;

  if(draft.mode==='main') renderMainStage();
  else renderMoveStage();
}

function renderMainStage(){
  stageTitle.textContent=`Стадия 1/2. Основное распределение: место ${draft.stage} (${POINTS[draft.stage-1]} баллов)`;
  stageHint.textContent=`Выберите игроков на это место. Пропуск можно только с ${WORST_STAGE_FROM}-го места.`;
  selectedInfo.textContent=`На месте ${draft.stage}: ${playersAtPlace(draft.stage).join(', ') || 'никого'}`;
  progress.textContent=`Пустые места: ${emptyPlaces().join(', ') || 'нет'}`;
  skipStageBtn.disabled=draft.stage<WORST_STAGE_FROM;
  confirmStageBtn.textContent=draft.stage<10?'Подтвердить место':'Перейти к стадии переноса';
  renderPickListMain();
  finishHint.textContent='';
  finishVoteBtn.disabled=true;
}

function renderMoveStage(){
  const place=draft.moveStage;
  if(place>=10){
    const still=emptyPlaces();
    stageTitle.textContent='Стадия 2/2 завершена';
    stageHint.textContent=''; selectedInfo.textContent=''; pickList.innerHTML=''; progress.textContent='';
    finishHint.textContent = still.length ? `Нельзя завершить: пустые места ${still.join(', ')}. Вернитесь и перенесите игроков вниз.` : 'Все места заполнены. Можно завершить голосование.';
    finishVoteBtn.disabled = still.length>0;
    return;
  }
  const fromPlayers=playersAtPlace(place);
  stageTitle.textContent=`Стадия 2/2. Перенос: место ${place} → место ${place+1}`;
  stageHint.textContent='Выберите чекбоксами худших на текущем месте — они будут перенесены на следующее место. Можно пропустить место.';
  selectedInfo.textContent=`Текущий состав места ${place}: ${fromPlayers.join(', ') || 'никого'}`;
  progress.textContent=`Шаг переноса ${place} из 9. После переноса игроки смещаются на 1 место вниз.`;
  confirmStageBtn.textContent='Подтвердить перенос худших';
  skipStageBtn.disabled=false;
  finishVoteBtn.disabled=true;
  renderPickListMove(fromPlayers, place);
}

function renderPickListMain(){
  pickList.innerHTML='';
  const unavailable = new Set(Object.entries(draft.picks).filter(([,pl])=>pl!==draft.stage).map(([n])=>n));
  state.players.forEach(player=>{ const lab=document.createElement('label'); lab.className='player-pick'; const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=playersAtPlace(draft.stage).includes(player); cb.disabled=unavailable.has(player); cb.onchange=()=>{ if(cb.checked) draft.picks[player]=draft.stage; else if(draft.picks[player]===draft.stage) delete draft.picks[player]; renderVoteFlow(); }; lab.append(cb,document.createTextNode(' '+player)); pickList.appendChild(lab); });
}

function renderPickListMove(fromPlayers, place){
  pickList.innerHTML='';
  const selected = draft.moveSelection[place] || [];
  if(!fromPlayers.length){ pickList.innerHTML='<div class="hint">На этом месте нет игроков для переноса.</div>'; return; }
  fromPlayers.forEach(player=>{ const lab=document.createElement('label'); lab.className='player-pick'; const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=selected.includes(player); cb.onchange=()=>{ const arr = new Set(draft.moveSelection[place]||[]); if(cb.checked) arr.add(player); else arr.delete(player); draft.moveSelection[place]=[...arr]; }; lab.append(cb,document.createTextNode(' '+player)); pickList.appendChild(lab); });
}

function applyMoveStage(){
  const place=draft.moveStage;
  const selected = new Set(draft.moveSelection[place] || []);
  if(selected.size){
    Object.keys(draft.picks).forEach(player=>{ if(draft.picks[player]===place && selected.has(player)) draft.picks[player]=place+1; });
  }
  draft.moveSelection[place]=[];
  draft.moveStage += 1;
}

function finalizeVote(){ for(const p of state.players) ensurePlayerVoteMap(p); for(const p of state.players){ const pl=draft.picks[p]; state.votes[p][state.currentUser]=POINTS[pl-1]; } saveState(); initDraft(); renderVoteFlow(); renderLeaderboard(); }
function getStats(player){ ensurePlayerVoteMap(player); const vals=Object.values(state.votes[player]).filter(v=>Number.isInteger(v)); const c=vals.length; return {avg:c?vals.reduce((a,b)=>a+b,0)/c:0,count:c}; }
function renderLeaderboard(){ const rows=state.players.map(p=>({player:p,...getStats(p)})).sort((a,b)=>b.avg-a.avg||b.count-a.count||a.player.localeCompare(b.player,'ru')); leaderboardBody.innerHTML=''; rows.forEach(r=>{const tr=document.createElement('tr'); tr.innerHTML=`<td>${r.player}</td><td>${r.avg.toFixed(2)}</td><td>${r.count}</td>`; leaderboardBody.appendChild(tr);}); }
function switchTab(tab,save=true){ state.activeTab=tab; const vote=tab==='vote'; votePanel.classList.toggle('hidden',!vote); leaderboardPanel.classList.toggle('hidden',vote); voteTabBtn.className=vote?'':'ghost'; leaderboardTabBtn.className=vote?'ghost':''; if(save) saveState(); }

loginBtn.onclick=()=>{const n=nicknameInput.value.trim(); if(!n) return; state.currentUser=n; if(!state.players.includes(n)) state.players.push(n); saveState(); initDraft(); render(); nicknameInput.value='';};
addPlayerBtn.onclick=()=>{const n=newPlayerInput.value.trim(); if(!n||state.players.includes(n)) return; state.players.push(n); ensurePlayerVoteMap(n); saveState(); render(); newPlayerInput.value='';};
voteTabBtn.onclick=()=>switchTab('vote'); leaderboardTabBtn.onclick=()=>switchTab('leaderboard');
logoutBtn.onclick=()=>{state.currentUser=''; saveState(); render();};
confirmStageBtn.onclick=()=>{ if(draft.mode==='main'){ if(draft.stage<10) draft.stage+=1; else { draft.mode='move'; draft.moveStage=1; } } else { applyMoveStage(); } renderVoteFlow(); };
skipStageBtn.onclick=()=>{ if(draft.mode==='main' && draft.stage<WORST_STAGE_FROM) return; if(draft.mode==='main'){ if(draft.stage<10) draft.stage+=1; else { draft.mode='move'; draft.moveStage=1; } } else { draft.moveSelection[draft.moveStage]=[]; draft.moveStage+=1; } renderVoteFlow(); };
finishVoteBtn.onclick=()=>{ if(emptyPlaces().length===0) finalizeVote(); else renderVoteFlow(); };

render();
</script>
</body>
</html>
