<!doctype html><html lang='ru'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Вход</title><link rel='stylesheet' href='styles.css'></head><body><div class='card'><h2>Вход / Регистрация</h2><div class='row'><input id='email' placeholder='Email'></div><div class='row' style='margin-top:8px'><input id='password' type='password' placeholder='Пароль'></div><div class='row' style='margin-top:10px'><button id='login-btn'>Войти</button><button id='register-btn' class='ghost'>Регистрация</button></div><div id='msg'></div></div>
<script type='module'>import { getUser, registerUser, withEmail } from './app.js';const $=id=>document.getElementById(id),msg=$('msg');$('login-btn').onclick=async()=>{try{const email=$('email').value.trim(),password=$('password').value;const u=await getUser(email);if(!u||u.password!==password) throw new Error('Неверный логин/пароль');location.href=withEmail(u.verified?'main.html':'verify.html',email);}catch(e){msg.textContent=e.message;msg.className='danger';}};$('register-btn').onclick=async()=>{try{const email=$('email').value.trim(),password=$('password').value;await registerUser(email,password);location.href=withEmail('verify.html',email);}catch(e){msg.textContent=e.message;msg.className='danger';}};</script></body></html>
