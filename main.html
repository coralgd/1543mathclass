<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='styles.css'></head><body><div class='card'><strong id='w'></strong><div class='row'><a id='v'><button>Голосование</button></a><a id='l'><button class='ghost'>Лидерборд</button></a><a id='m' class='hidden'><button>Проверить</button></a><a href='index.html'><button class='ghost'>Выйти</button></a></div></div><script type='module'>import {getEmailFromUrl,watchUser,withEmail} from './app.js';const e=getEmailFromUrl();if(!e)location.href='index.html';v.href=withEmail('vote.html',e);l.href=withEmail('leaderboard.html',e);watchUser(e,u=>{if(!u)return location.href='index.html';if(!u.verified)return location.href=withEmail('verify.html',e);w.textContent='Вы вошли: '+e;if(u.role==='moder'){m.classList.remove('hidden');m.href=withEmail('moderator.html',e);}else m.classList.add('hidden');});</script></body></html>
