<!doctype html><html lang='ru'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Main</title><link rel='stylesheet' href='styles.css'></head><body><div class='card'><div class='row' style='justify-content:space-between'><strong id='welcome'></strong><a href='index.html'><button class='ghost'>Выйти</button></a></div><div class='row' style='margin-top:12px'><a id='vote-link'><button>Страница голосования</button></a><a id='lb-link'><button class='ghost'>Страница лидерборда</button></a><a id='mod-link' class='hidden'><button>Проверить</button></a></div></div>
<script type='module'>import { getEmailFromUrl, getUser, withEmail } from './app.js';const email=getEmailFromUrl();if(!email) location.href='index.html';async function tick(){const u=await getUser(email);if(!u) return location.href='index.html';if(!u.verified) return location.href=withEmail('verify.html',email);document.getElementById("welcome").textContent=`Вы вошли: ${email}`;document.getElementById('vote-link').href=withEmail('vote.html',email);document.getElementById('lb-link').href=withEmail('leaderboard.html',email);if(u.role==='moder'){const m=document.getElementById('mod-link');m.classList.remove('hidden');m.href=withEmail('moderator.html',email);} }tick();setInterval(tick,5000);</script></body></html>
